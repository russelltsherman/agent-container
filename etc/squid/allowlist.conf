# Squid allowlist — one domain per line (squid dstdomain ACL format)
# Leading dot means the domain and all subdomains are permitted.
# This file is committed to the repository and reviewed with code changes.

# Anthropic — covers api.anthropic.com, claude.ai, statsig.anthropic.com, etc.
# Leading dot matches the domain itself and all subdomains.
.anthropic.com
.claude.ai
.claude.com

# OpenAI Codex — the built-in `codex_apps` MCP client handshakes with the
# ChatGPT apps backend at chatgpt.com/backend-api/wham/apps on startup.
# Without this, codex prints an MCP transport error. Token refresh may also
# use auth.openai.com; add .openai.com here if codex auth starts failing.
.chatgpt.com

# Graphite CLI endpoints
.graphite.dev
.graphite.com

# GitHub (needed for gt operations)
.github.com
.githubusercontent.com

# allow for linear mcp
.linear.app

# allow for codex and openai documentation
.openai.com

# allow fetching published schemas
.schemastore.org

# Docker host gateway — allows the container to reach services running on
# the host machine (e.g. oMLX local model server on port 8000).
host.docker.internal
